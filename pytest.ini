[tool:pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --strict-config
    --disable-warnings
    --color=yes

# Custom markers
markers =
    unit: Unit tests for individual components (fast, no external dependencies)
    integration: Integration tests for component interaction (medium speed, may require API keys)
    e2e: End-to-end tests for complete workflows (slow, requires full setup)
    slow: Tests that take more than 30 seconds to run
    network: Tests that require network access
    llm: Tests that interact with LLM APIs
    storm: Tests that use STORM framework
    requires_auth: Tests that require authentication credentials
    agents: Tests specifically for agent components
    tools: Tests for tool functions

# Async support
asyncio_mode = auto

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Timeout (in seconds)
timeout = 300
timeout_method = thread

# Coverage (uncomment to enable)
# addopts = --cov=agents --cov=api --cov=utils --cov-report=html --cov-report=term-missing

# Parallel execution (uncomment to enable)
# addopts = -n auto